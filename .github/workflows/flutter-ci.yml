name: Flutter CI + Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.41.5
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

  build-android:
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    needs: verify
    env:
      OWNER_ACCESS_CODE: ${{ secrets.OWNER_ACCESS_CODE }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.41.5
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Verify activation code secret exists
        run: |
          if [ -z "$OWNER_ACCESS_CODE" ]; then
            echo "ERROR: Missing GitHub secret OWNER_ACCESS_CODE"
            echo "Add it in: Repository Settings > Secrets and variables > Actions"
            exit 1
          fi

      - name: Build split-ABI APKs
        run: |
          flutter build apk \
            --release \
            --split-per-abi \
            --dart-define=OWNER_ACCESS_CODE="$OWNER_ACCESS_CODE"

      - name: Upload Android release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-release-apks
          path: build/app/outputs/flutter-apk/*-release.apk

  build-linux:
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang \
            cmake \
            ninja-build \
            pkg-config \
            libgtk-3-dev \
            liblzma-dev \
            libgstreamer1.0-dev \
            libgstreamer-plugins-base1.0-dev \
            gstreamer1.0-plugins-base \
            gstreamer1.0-plugins-good \
            espeak-ng

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.41.5
          cache: true

      - name: Enable Linux desktop
        run: flutter config --enable-linux-desktop

      - name: Install dependencies
        run: flutter pub get

      - name: Build Linux release
        run: flutter build linux --release

      - name: Pack Linux bundle
        run: |
          cd build/linux/x64/release
          tar -czf lifer-linux-x64-${{ github.ref_name }}.tar.gz bundle

      - name: Upload Linux release artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-release-bundle
          path: build/linux/x64/release/lifer-linux-x64-${{ github.ref_name }}.tar.gz

  build-windows:
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    runs-on: windows-latest
    needs: verify
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.41.5
          cache: true

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Install dependencies
        run: flutter pub get

      - name: Build Windows release
        run: flutter build windows --release

      - name: Pack Windows bundle
        shell: pwsh
        run: |
          Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath build/windows/x64/runner/Release/lifer-windows-x64-${{ github.ref_name }}.zip

      - name: Upload Windows release artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-release-bundle
          path: build/windows/x64/runner/Release/lifer-windows-x64-${{ github.ref_name }}.zip

  publish-release:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: [build-android, build-linux, build-windows]
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Publish GitHub Release assets
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/android-release-apks/*.apk
            dist/linux-release-bundle/*.tar.gz
            dist/windows-release-bundle/*.zip
