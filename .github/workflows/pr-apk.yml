name: PR – Build APK

on:
  pull_request:
    types: [opened, synchronize, reopened]

# Only one run per PR branch at a time; cancel stale runs automatically.
concurrency:
  group: pr-apk-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-apk:
    name: Build debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter (stable)
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build debug APK
        run: flutter build apk --debug

      # The artifact is attached to the workflow run and is accessible from the
      # "Checks" tab of the pull request — no signing key required.
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: lifer-pr${{ github.event.pull_request.number }}-debug
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 7
          if-no-files-found: error
